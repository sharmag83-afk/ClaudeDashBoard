<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Daily Planner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="sidebar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --accent: #6BE3A4;
  --blue: #7DD3FC;
  --warn: #fbbf24;
  --danger: #f87171;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --card-bg: rgba(255,255,255,0.035);
  --card-border: rgba(255,255,255,0.07);
  --radius: 14px;
}
* { box-sizing: border-box; }
html, body { margin:0; padding:0; background:#050506; color:var(--text-secondary); font-family:var(--font); -webkit-font-smoothing:antialiased; }
body { min-height:100vh; padding: max(22px, env(safe-area-inset-top)) 20px 40px; overflow-x:hidden; }

.page { max-width:960px; margin:0 auto; }
.page-title {
  font-size:24px; font-weight:700; letter-spacing:-0.02em;
  background:linear-gradient(180deg,#fff 0%,#C7C4BC 120%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:transparent;
  margin:0 0 20px;
}

.planner-grid {
  display:grid;
  grid-template-columns:280px 1fr;
  gap:18px;
  align-items:start;
}
@media (max-width:720px) {
  .planner-grid { grid-template-columns:1fr; }
}

/* Calendar */
.cal-card {
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:var(--radius);
  overflow:hidden;
  margin-bottom:14px;
}
.cal-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px;
  background:rgba(107,227,164,0.1);
  border-bottom:1px solid var(--card-border);
}
.cal-month { font-size:13px; font-weight:700; color:var(--text-primary); }
.cal-nav { background:none; border:none; color:var(--text-secondary); font-size:18px; cursor:pointer; padding:0 4px; line-height:1; transition:color .15s; }
.cal-nav:hover { color:var(--text-primary); }
.cal-body { padding:10px; }
.cal-dnames { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px; }
.cal-dn { text-align:center; font-size:9.5px; font-weight:700; color:var(--text-tertiary); letter-spacing:.06em; padding:3px 0; }
.cal-days { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.cal-d {
  aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  font-size:12px; border-radius:50%; cursor:pointer; color:var(--text-secondary);
  transition:background .1s, color .1s; position:relative;
}
.cal-d:hover { background:rgba(255,255,255,0.06); color:var(--text-primary); }
.cal-d.dim { color:var(--text-tertiary); opacity:.4; }
.cal-d.today { background:rgba(107,227,164,0.15); color:var(--accent); font-weight:700; }
.cal-d.sel { background:var(--accent) !important; color:#050506 !important; font-weight:700; }
.cal-d.has::after { content:''; position:absolute; bottom:3px; width:4px; height:4px; border-radius:50%; background:var(--blue); }
.cal-d.sel.has::after { background:#050506; }

/* Week strip */
.week-strip { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:18px; }
.wk-col {
  background:var(--card-bg); border:1px solid var(--card-border);
  border-radius:10px; padding:8px 4px; text-align:center; cursor:pointer;
  transition:border-color .15s;
}
.wk-col:hover { border-color:rgba(107,227,164,0.4); }
.wk-col.today { background:rgba(107,227,164,0.1); border-color:rgba(107,227,164,0.4); }
.wk-dn { font-size:9px; font-weight:700; color:var(--text-tertiary); letter-spacing:.05em; margin-bottom:2px; }
.wk-dd { font-size:15px; font-weight:300; color:var(--text-secondary); margin-bottom:3px; }
.wk-col.today .wk-dd { color:var(--accent); font-weight:600; }
.wk-ev { width:5px; height:5px; border-radius:50%; background:var(--blue); margin:0 auto; }

/* Day events panel */
.day-panel {
  background:var(--card-bg); border:1px solid var(--card-border);
  border-radius:var(--radius); overflow:hidden; margin-bottom:14px;
}
.day-ph {
  padding:12px 16px; background:rgba(255,255,255,0.03);
  border-bottom:1px solid var(--card-border);
  font-size:13px; font-weight:700; color:var(--text-primary);
}
.day-pb { padding:12px 16px; min-height:100px; }
.ev-item { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); align-items:flex-start; }
.ev-item:last-child { border-bottom:none; }
.ev-time { font-size:11px; color:var(--text-tertiary); min-width:56px; padding-top:2px; font-weight:600; font-family:var(--font-mono); }
.ev-line { width:2px; background:var(--blue); border-radius:2px; margin-top:4px; min-height:36px; flex-shrink:0; }
.ev-det { flex:1; }
.ev-title { font-size:13px; font-weight:600; color:var(--text-primary); margin-bottom:2px; }
.ev-meta { font-size:11px; color:var(--text-tertiary); }
.ev-link { color:var(--blue); text-decoration:none; }
.ev-link:hover { text-decoration:underline; }
.ev-empty { text-align:center; padding:24px; color:var(--text-tertiary); font-size:13px; }

/* Loading */
.loading { text-align:center; padding:20px; color:var(--text-tertiary); font-size:12px; }

/* Todo */
.todo-card {
  background:var(--card-bg); border:1px solid var(--card-border);
  border-radius:var(--radius); overflow:hidden;
}
.todo-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px; border-bottom:1px solid var(--card-border);
  background:rgba(255,255,255,0.03);
}
.todo-head-title { font-size:13px; font-weight:700; color:var(--text-primary); }
.todo-add-btn {
  background:none; border:none; color:var(--accent); font-size:22px; line-height:1;
  cursor:pointer; padding:0;
}
.todo-list { padding:4px 0; }
.todo-row { display:flex; align-items:center; gap:10px; padding:8px 16px; transition:background .1s; }
.todo-row:hover { background:rgba(255,255,255,0.03); }
.todo-cb {
  width:16px; height:16px; border:1.5px solid rgba(255,255,255,0.2);
  border-radius:4px; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.todo-cb.ck { background:var(--accent); border-color:var(--accent); }
.todo-cb.ck::after { content:'✓'; color:#050506; font-size:10px; font-weight:800; }
.todo-txt { flex:1; font-size:13px; color:var(--text-secondary); }
.todo-txt.done { text-decoration:line-through; color:var(--text-tertiary); }
.pbadge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
.pbadge.high { background:rgba(248,113,113,0.15); color:#f87171; }
.pbadge.med  { background:rgba(251,191,36,0.15);  color:#fbbf24; }
.pbadge.low  { background:rgba(107,227,164,0.15); color:#6BE3A4; }
.todo-form {
  display:none; padding:10px 16px; border-top:1px solid var(--card-border);
  gap:8px; flex-wrap:wrap;
}
.todo-form.open { display:flex; }
.todo-inp {
  flex:1; min-width:120px; padding:9px 12px;
  border:1px solid rgba(255,255,255,0.1); border-radius:10px;
  background:rgba(0,0,0,0.3); color:var(--text-primary);
  font-family:var(--font); font-size:13px; outline:none; transition:border-color .2s;
}
.todo-inp:focus { border-color:var(--accent); }
.pri-sel {
  border:1px solid rgba(255,255,255,0.1); border-radius:10px;
  padding:9px 10px; font-family:var(--font); font-size:12px;
  background:rgba(0,0,0,0.3); color:var(--text-primary); outline:none;
}
.todo-sub {
  background:var(--accent); color:#050506; border:none; border-radius:10px;
  padding:9px 16px; font-family:var(--font); font-size:13px; font-weight:700;
  cursor:pointer; white-space:nowrap;
}

.section-lbl {
  font-size:10px; font-weight:700; color:var(--text-tertiary);
  text-transform:uppercase; letter-spacing:.08em; margin-bottom:10px;
}
</style>
</head>
<body>
<div class="page">
  <h1 class="page-title">📅 Daily Planner</h1>

  <!-- Week strip -->
  <div class="section-lbl">This Week</div>
  <div class="week-strip" id="week-strip"></div>

  <div class="planner-grid">
    <!-- Left: Calendar + Todo -->
    <div>
      <div class="cal-card">
        <div class="cal-head">
          <button class="cal-nav" onclick="chMonth(-1)">‹</button>
          <span class="cal-month" id="cal-lbl"></span>
          <button class="cal-nav" onclick="chMonth(1)">›</button>
        </div>
        <div class="cal-body">
          <div class="cal-dnames">
            <div class="cal-dn">Su</div><div class="cal-dn">Mo</div><div class="cal-dn">Tu</div>
            <div class="cal-dn">We</div><div class="cal-dn">Th</div><div class="cal-dn">Fr</div><div class="cal-dn">Sa</div>
          </div>
          <div class="cal-days" id="cal-days"></div>
        </div>
      </div>

      <div class="todo-card">
        <div class="todo-head">
          <span class="todo-head-title">📝 Tasks</span>
          <button class="todo-add-btn" onclick="toggleForm()">+</button>
        </div>
        <div class="todo-list" id="todo-list"></div>
        <div class="todo-form" id="todo-form">
          <input class="todo-inp" id="t-inp" placeholder="New task…" onkeydown="if(event.key==='Enter')addTask()">
          <select class="pri-sel" id="t-pri">
            <option value="high">🔴 High</option>
            <option value="med" selected>🟡 Med</option>
            <option value="low">🟢 Low</option>
          </select>
          <button class="todo-sub" onclick="addTask()">Add</button>
        </div>
      </div>
    </div>

    <!-- Right: Day events -->
    <div>
      <div class="day-panel">
        <div class="day-ph" id="day-hdr">Select a date to view events</div>
        <div class="day-pb" id="day-body">
          <div class="ev-empty">Click any date on the calendar</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const NOW = new Date();
  const TY = NOW.getFullYear(), TM = NOW.getMonth(), TD = NOW.getDate();
  let calY = TY, calM = TM, sel = null;

  // Todos stored in localStorage
  const TODO_KEY = 'planner:todos:v1';
  function loadTodos() { try { return JSON.parse(localStorage.getItem(TODO_KEY)) || []; } catch(e) { return []; } }
  function saveTodos(t) { localStorage.setItem(TODO_KEY, JSON.stringify(t)); }
  let todos = loadTodos();
  let tid = Math.max(0, ...todos.map(t=>t.id||0)) + 1;

  // Calendar events — stubbed (no live API on this standalone page)
  // Events will show if passed via URL param or set externally
  const evCache = {};

  const MONS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DNS  = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const MABV = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function renderCal() {
    document.getElementById('cal-lbl').textContent = MONS[calM] + ' ' + calY;
    const grid = document.getElementById('cal-days');
    grid.innerHTML = '';
    const first = new Date(calY,calM,1).getDay();
    const dim   = new Date(calY,calM+1,0).getDate();
    const prev  = new Date(calY,calM,0).getDate();
    const key   = calY+'-'+String(calM+1).padStart(2,'0');
    const evDays = new Set((evCache[key]||[]).map(e=>new Date(e.start).getDate()));

    for (let i=first-1;i>=0;i--) mk(prev-i,true,false,false,false);
    for (let d=1;d<=dim;d++) mk(d,false,calY===TY&&calM===TM&&d===TD,sel&&calY===sel.y&&calM===sel.m&&d===sel.d,evDays.has(d));
    const rem=(first+dim)%7===0?0:7-(first+dim)%7;
    for (let d=1;d<=rem;d++) mk(d,true,false,false,false);

    function mk(d,isDim,isT,isSel,hasEv) {
      const el=document.createElement('div');
      el.className='cal-d'+(isDim?' dim':'')+(isT?' today':'')+(isSel?' sel':'')+(hasEv?' has':'');
      el.textContent=d;
      if(!isDim) el.onclick=()=>pickDay(d);
      grid.appendChild(el);
    }
  }

  function chMonth(dir) {
    calM+=dir; if(calM>11){calM=0;calY++;} if(calM<0){calM=11;calY--;}
    renderCal();
  }

  function pickDay(d) {
    sel={y:calY,m:calM,d};
    renderCal();
    showDay(calY,calM,d);
  }

  function showDay(y,m,d) {
    const key=y+'-'+String(m+1).padStart(2,'0');
    const evs=(evCache[key]||[]).filter(e=>new Date(e.start).getDate()===d);
    const dobj=new Date(y,m,d);
    document.getElementById('day-hdr').textContent=DNS[dobj.getDay()]+', '+d+' '+MABV[m]+' '+y;
    const body=document.getElementById('day-body');
    if(!evs.length){ body.innerHTML='<div class="ev-empty">No events · open time ✨</div>'; return; }
    body.innerHTML=evs.map(e=>{
      const s=new Date(e.start), en=new Date(e.end||e.start);
      const fmt=d=>d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      return `<div class="ev-item">
        <div class="ev-time">${fmt(s)}–${fmt(en)}</div>
        <div class="ev-line"></div>
        <div class="ev-det"><div class="ev-title">${e.title||'Event'}</div>${e.location?`<div class="ev-meta">📍 ${e.location}</div>`:''}</div>
      </div>`;
    }).join('');
  }

  function renderWeek() {
    const strip=document.getElementById('week-strip');
    strip.innerHTML='';
    const sow=new Date(NOW); sow.setDate(NOW.getDate()-NOW.getDay());
    for(let i=0;i<7;i++) {
      const d=new Date(sow); d.setDate(sow.getDate()+i);
      const isT=d.getDate()===TD&&d.getMonth()===TM&&d.getFullYear()===TY;
      const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      const has=(evCache[key]||[]).some(e=>new Date(e.start).getDate()===d.getDate());
      const col=document.createElement('div');
      col.className='wk-col'+(isT?' today':'');
      col.innerHTML=`<div class="wk-dn">${DNS[i]}</div><div class="wk-dd">${d.getDate()}</div>${has?'<div class="wk-ev"></div>':''}`;
      const dy=d.getFullYear(),dm=d.getMonth(),dd=d.getDate();
      col.onclick=()=>{calY=dy;calM=dm;pickDay(dd);};
      strip.appendChild(col);
    }
  }

  // Todos
  function renderTodos() {
    const el=document.getElementById('todo-list');
    if(!todos.length){el.innerHTML='<div class="ev-empty" style="padding:16px">All clear — no tasks</div>';return;}
    el.innerHTML=todos.map(t=>`
      <div class="todo-row">
        <div class="todo-cb${t.done?' ck':''}" onclick="toggleT(${t.id})"></div>
        <div class="todo-txt${t.done?' done':''}">${t.text}</div>
        <span class="pbadge ${t.pri}">${t.pri==='high'?'🔴 High':t.pri==='med'?'🟡 Med':'🟢 Low'}</span>
      </div>`).join('');
  }
  window.toggleT=function(id){const t=todos.find(x=>x.id===id);if(t){t.done=!t.done;saveTodos(todos);renderTodos();}};
  window.toggleForm=function(){const f=document.getElementById('todo-form');f.classList.toggle('open');if(f.classList.contains('open'))document.getElementById('t-inp').focus();};
  window.addTask=function(){
    const inp=document.getElementById('t-inp'),txt=inp.value.trim();if(!txt)return;
    todos.unshift({id:tid++,text:txt,pri:document.getElementById('t-pri').value,done:false});
    saveTodos(todos); inp.value=''; document.getElementById('todo-form').classList.remove('open');
    renderTodos();
  };

  renderCal(); renderWeek(); renderTodos();
  pickDay(TD);
})();
</script>
</body>
</html>
